apiVersion: v1
kind: Pod
metadata: 
  name: nginx-affinity
  labels:
    env: test
spec:
  affinity:
    nodeAffinity:
      # hard rule
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: topology.kubernetes.io/zone
            operator: In
            values:
            - us-east-1b
            - us-east-1d
      # soft rule
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: project
            operator: In
            values:
            - roboshopp
      - weight: 10
        preference:
          matchExpressions:
          - key: project
            operator: In
            values:
            - flipkart
  containers:
  - name: nginx
    image: nginx